# JGlimsPlugin v1.2.0 Configuration
# All multipliers stack multiplicatively unless noted otherwise.

# ==========================================
# MOB DIFFICULTY SYSTEM (INCREASED in v1.1.0)
# ==========================================
mob-difficulty:
  enabled: true
  baseline:
    health: 2.0
    damage: 2.0
  overworld-distance:
    200:   [1.0, 1.0, 1.0]
    350:   [1.5, 1.3, 1.0]
    600:   [1.8, 1.6, 1.05]
    800:   [2.3, 1.9, 1.1]
    1000:  [3.0, 2.3, 1.15]
    99999: [3.5, 2.8, 1.25]
  overworld-biomes:
    PALE_GARDEN:       [2.0, 2.0]
    DEEP_DARK:         [2.5, 2.0]
    SWAMP:             [1.4, 1.3]
    MANGROVE_SWAMP:    [1.4, 1.3]
    DARK_FOREST:       [1.5, 1.4]
    DRIPSTONE_CAVES:   [1.6, 1.4]
    LUSH_CAVES:        [0.8, 0.9]
  nether-biomes:
    NETHER_WASTES:     [1.7, 1.5]
    SOUL_SAND_VALLEY:  [2.0, 1.8]
    CRIMSON_FOREST:    [1.8, 1.6]
    WARPED_FOREST:     [1.8, 1.6]
    BASALT_DELTAS:     [2.3, 2.0]
  end:
    health: 2.5
    damage: 2.0
  bosses:
    ENDER_DRAGON:
      health: 3.5
      damage: 3.0
    WITHER:
      health: 2.5
      damage: 2.2
    WARDEN:
      health: 2.0
      damage: 2.5
    ELDER_GUARDIAN:
      health: 2.5
      damage: 1.8

# ==========================================
# CREEPER SPAWN REDUCTION
# ==========================================
creeper:
  enabled: true
  cancel-chance: 0.5

# ==========================================
# PALE GARDEN FOG
# ==========================================
pale-garden-fog:
  enabled: true
  check-interval: 40

# ==========================================
# LOOT TABLE BOOSTER
# ==========================================
loot-booster:
  enabled: true
  chest-enchanted-book: true
  guardian-prismarine-shards: [1, 3]
  elder-guardian-prismarine-shards: [3, 5]
  ghast-tears: [1, 2]
  echo-shard-chance: 0.40

# ==========================================
# MOB ENCHANTED BOOK DROPS (NEW v1.1.0)
# ==========================================
mob-book-drops:
  enabled: true
  hostile-mob-chance: 0.05
  boss-custom-chance: 0.15
  looting-bonus-regular: 0.02
  looting-bonus-boss: 0.05

# ==========================================
# BLESSINGS
# ==========================================
blessings:
  c-bless:
    max-uses: 10
    hearts-per-use: 1
  ami-bless:
    max-uses: 10
    damage-percent-per-use: 2.0
  la-bless:
    max-uses: 10
    defense-per-use: 2.0

# ==========================================
# INVENTORY SORTING
# ==========================================
inventory-sort:
  enabled: true

# ==========================================
# ENCHANTMENT TRANSFER
# ==========================================
enchantment-transfer:
  enabled: true

# ==========================================
# ANVIL TOO EXPENSIVE REMOVAL
# ==========================================
anvil:
  remove-too-expensive: true
  xp-cost-reduction: 0.50

# ==========================================
# SICKLE SYSTEM
# ==========================================
sickle:
  enabled: true

# ==========================================
# BATTLE AXE SYSTEM (NEW v1.1.0)
# ==========================================
battle-axe:
  enabled: true

# ==========================================
# BATTLE BOW/CROSSBOW SYSTEM (NEW v1.1.0)
# ==========================================
battle-bow:
  enabled: true

# ==========================================
# BATTLE MACE SYSTEM (NEW v1.2.0)
# ==========================================
battle-mace:
  enabled: true

# ==========================================
# SUPER TOOLS SYSTEM (OVERHAULED v1.1.0)
# ==========================================
super-tools:
  enabled: true

# ==========================================
# DROP RATE BOOSTER
# ==========================================
drop-rate-booster:
  enabled: true
  trident-drop-chance: 0.35
  breeze-wind-charge-min: 2
  breeze-wind-charge-max: 5

# ==========================================
# VILLAGER TRADE IMPROVEMENTS (NEW v1.1.0)
# ==========================================
villager-trades:
  enabled: true
  price-reduction: 0.50
  disable-trade-locking: true

# ==========================================
# KING MOB SYSTEM (NEW v1.1.0)
# ==========================================
king-mob:
  enabled: true
  spawns-per-king: 500
  health-multiplier: 10.0
  damage-multiplier: 3.0
  diamond-drop-min: 3
  diamond-drop-max: 9

# ==========================================
# NORMAL AXE COMBAT NERF (NEW v1.1.0)
# ==========================================
axe-nerf:
  enabled: true
  attack-speed: 0.5

# ==========================================
# WEAPON MASTERY SYSTEM (NEW v1.2.0)
# Tracks kills per weapon class, grants up to
# max-bonus-percent damage bonus at max-kills.
# ==========================================
weapon-mastery:
  enabled: true
  max-kills: 1000
  max-bonus-percent: 10.0

# ==========================================
# BLOOD MOON EVENT (NEW v1.2.0)
# Triggers every check-interval-ticks at nightfall.
# chance = probability per eligible night.
# Every boss-every-nth Blood Moon spawns a boss.
# ==========================================
blood-moon:
  enabled: true
  check-interval-ticks: 100
  chance: 0.15
  mob-health-multiplier: 1.5
  mob-damage-multiplier: 1.3
  boss-every-nth: 10
  boss-health-multiplier: 20.0
  boss-damage-multiplier: 5.0
  boss-diamond-min: 5
  boss-diamond-max: 15
  double-drops: true

# ==========================================
# GUILD SYSTEM (NEW v1.2.0)
# max-members: max players per guild
# friendly-fire: whether guild members can hurt each other
# ==========================================
guilds:
  enabled: true
  max-members: 10
  friendly-fire: false
