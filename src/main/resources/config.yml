# ==============================================
# JGlimsPlugin v1.3.0 Configuration
# ==============================================

# --- Mob Difficulty ---
mob-difficulty:
  enabled: true
  baseline-health-multiplier: 1.0
  baseline-damage-multiplier: 1.0
  distance:
    350:
      health: 1.5
      damage: 1.3
    700:
      health: 2.0
      damage: 1.6
    1000:
      health: 2.5
      damage: 1.9
    2000:
      health: 3.0
      damage: 2.2
    3000:
      health: 3.5
      damage: 2.5
    5000:
      health: 4.0
      damage: 3.0
  biome:
    pale-garden: 2.0
    deep-dark: 2.5
    swamp: 1.4
    nether-wastes:
      health: 1.7
      damage: 1.7
    soul-sand-valley:
      health: 1.9
      damage: 1.9
    crimson-forest:
      health: 2.0
      damage: 2.0
    warped-forest:
      health: 2.0
      damage: 2.0
    basalt-deltas:
      health: 2.3
      damage: 2.3
    end:
      health: 2.5
      damage: 2.0

# --- Boss Enhancer ---
# Warden and Wither at vanilla (1.0). Ender Dragon is the strongest.
boss-enhancer:
  ender-dragon:
    health: 3.5
    damage: 3.0
  wither:
    health: 1.0
    damage: 1.0
  warden:
    health: 1.0
    damage: 1.0
  elder-guardian:
    health: 2.5
    damage: 1.8

# --- Creeper Reduction ---
creeper-reduction:
  enabled: true
  cancel-chance: 0.5

# --- Pale Garden Fog ---
pale-garden-fog:
  enabled: true
  check-interval: 40

# --- Loot Booster ---
loot-booster:
  enabled: true
  chest-enchanted-book: true
  guardian-shards-min: 1
  guardian-shards-max: 3
  elder-guardian-shards-min: 3
  elder-guardian-shards-max: 5
  ghast-tears-min: 1
  ghast-tears-max: 2
  echo-shard-chance: 0.40

# --- Mob Book Drops ---
mob-book-drops:
  enabled: true
  hostile-chance: 0.05
  boss-custom-chance: 0.15
  looting-bonus-regular: 0.02
  looting-bonus-boss: 0.05

# --- Blessings ---
blessings:
  c-bless:
    max-uses: 10
    heal-per-use: 1
  ami-bless:
    max-uses: 10
    damage-percent-per-use: 2.0
  la-bless:
    max-uses: 10
    defense-percent-per-use: 2.0

# --- Anvil ---
anvil:
  remove-too-expensive: true
  xp-cost-reduction: 0.5

# --- Toggles ---
toggles:
  inventory-sort: true
  enchant-transfer: true
  sickle: true
  battle-axe: true
  battle-bow: true
  battle-mace: true
  battle-shovel: true
  super-tools: true
  drop-rate-booster: true
  spear: true

# --- Drop Rate Booster ---
drop-rate-booster:
  trident-drop-chance: 0.35
  breeze-wind-charge-min: 2
  breeze-wind-charge-max: 5

# --- Villager Trades ---
villager-trades:
  enabled: true
  price-reduction: 0.50
  disable-trade-locking: true

# --- King Mob ---
king-mob:
  enabled: true
  spawns-per-king: 100
  health-multiplier: 10.0
  damage-multiplier: 3.0
  diamond-drop-min: 3
  diamond-drop-max: 9

# --- Axe Nerf ---
axe-nerf:
  enabled: true
  attack-speed: 0.5

# --- Weapon Mastery ---
weapon-mastery:
  enabled: true
  max-kills: 1000
  max-bonus-percent: 10.0

# --- Blood Moon ---
blood-moon:
  enabled: true
  check-interval: 100
  chance: 0.15
  mob-health-multiplier: 1.5
  mob-damage-multiplier: 1.3
  boss-every-nth: 10
  boss-health-multiplier: 20.0
  boss-damage-multiplier: 5.0
  boss-diamond-min: 5
  boss-diamond-max: 15
  double-drops: true

# --- Guilds ---
guilds:
  enabled: true
  max-members: 10
  friendly-fire: false

# --- Best Buddies (Dog Armor) ---
best-buddies:
  dog-armor-damage-reduction: 0.95

# --- Super Tools ---
super-tools:
  iron-bonus-damage: 1.0
  diamond-bonus-damage: 2.0
  netherite-bonus-damage: 2.0
  netherite-per-enchant-bonus-percent: 2.0

# --- Ore Detect (Super Pickaxe Ability) ---
ore-detect:
  # Normal ore radius
  radius-diamond: 8
  radius-netherite: 12
  # Ancient Debris gets a MUCH larger radius
  ancient-debris-radius-diamond: 24
  ancient-debris-radius-netherite: 40
  # How long particles show (ticks, 200 = 10 seconds)
  duration-ticks: 200
