name: JGlimsPlugin
version: '1.0.0'
api: bukkit
main: com.jglims.plugin.JGlimsPlugin
api-version: '1.21'
authors:
  - JGlims
description: Custom mega plugin for JGlims Minecraft Server - enchantments, sickles, super tools, blessings, mob difficulty, and more.
commands:
  jglims:
    description: Main command for JGlimsPlugin
    usage: /jglims <reload|stats|enchants|sort>
    permission: jglims.admin
permissions:
  jglims.admin:
    description: Access to all JGlimsPlugin admin commands
    default: op